<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher's Directory - NUBTK</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
  
  <style>
    
    :root {
      --bg-dark: #000;
      --card-bg: #08080e;
      --gold: #00ff41;
      --text-light: #d4d4d4;
      --muted: #555555;
    }
    
    body { 
      margin: 0; 
      font-family: 'DM Sans', sans-serif; 
      background: var(--bg-dark); 
      color: var(--text-light); 
    }
    
    .header { text-align: center; padding: 100px 20px 20px; }
    .header h1 { color: var(--gold); font-family: 'Orbitron', sans-serif; margin: 0 0 10px 0; font-size: 2rem; }
    
    
    .search-container { text-align: center; margin-bottom: 30px; padding: 0 20px;}
    .search-bar { 
      width: 100%; max-width: 500px; padding: 14px 24px; 
      border-radius: 50px; border: 2px solid rgba(139,92,246,0.3); 
      background: rgba(255,255,255,0.03); color: white; 
      font-size: 1rem; outline: none; transition: 0.3s;
    }
    .search-bar:focus { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(0,255,65,0.2); background: rgba(255,255,255,0.05); }
    .search-bar::placeholder { color: var(--muted); }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }
    
    
    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
      gap: 25px; 
    }
    
    
    .t-card { 
      background: var(--card-bg); 
      border: 1px solid rgba(139,92,246,0.12); 
      border-radius: 12px; 
      padding: 30px 20px; 
      text-align: center; 
      transition: all 0.3s ease; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: relative; overflow: hidden;
    }
    .t-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), #8b5cf6);
      opacity: 0; transition: opacity 0.3s;
    }
    .t-card:hover { 
      transform: translateY(-4px); 
      border-color: rgba(139,92,246,0.25); 
      box-shadow: 0 12px 35px rgba(0,0,0,0.5), 0 0 0 1px rgba(139,92,246,0.08);
    }
    .t-card:hover::before { opacity: 1; }
    
    .t-img { 
      width: 110px; height: 110px; 
      border-radius: 50%; object-fit: cover; 
      border: 3px solid var(--gold); 
      margin-bottom: 15px; background: white;
      box-shadow: 0 0 0 2px rgba(0,255,65,0.1);
    }
    
    .t-name { font-size: 1.25rem; font-weight: bold; color: var(--gold); margin-bottom: 4px; text-shadow: 0 0 10px rgba(0,255,65,0.15); }
    .t-desig { font-size: 1rem; font-weight: 600; color: white; margin-bottom: 2px; }
    .t-dept { font-size: 0.85rem; color: var(--muted); margin-bottom: 18px; text-transform: uppercase; letter-spacing: 1px;}
    
      .t-short {
           display: inline-block;
           background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
           color: #fff;
           font-family: var(--ff-head);
           font-weight: bold;
           font-size: 0.7rem;
           padding: 3px 8px;
           border-radius: 4px;
           margin-top: 4px;
           margin-bottom: 6px;
           letter-spacing: 0.5px;
           text-transform: uppercase;
           box-shadow: 0 2px 5px rgba(0,0,0,0.2);
         }
    
    .t-contact { 
      font-size: 0.9rem; color: #ddd; 
      background: rgba(139,92,246,0.06); 
      padding: 12px; border-radius: 10px; 
      word-break: break-all;
      border: 1px solid rgba(139,92,246,0.08);
    }
    .t-contact div { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 4px 0; }
  </style>
</head>
<body>
  
  <div class="header">
    <h1>Teacher's Directory</h1>
    <p style="color:var(--muted); font-size: 1.1rem;">Find your respected faculty members and contact info easily.</p>
  </div>

  <div class="search-container">
    <input type="text" id="search-input" class="search-bar" placeholder="Search by name, department or designation..." onkeyup="filterTeachers()">
  </div>

  <div class="container">
    <div class="grid" id="teachers-grid">
      <div style="text-align:center; color:var(--muted); grid-column: 1 / -1; padding: 40px; font-size: 1.1rem;">
        Loading directory from Live Database...
      </div>
    </div>
  </div>

  <script>

    const firebaseConfig = {
      apiKey: "AIzaSyCF9BoDxWa-0XTwbCBxjHrrBdQrKioJua8",
      authDomain: "nubtk-portal.firebaseapp.com",
      databaseURL: "https://nubtk-portal-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "nubtk-portal",
      storageBucket: "nubtk-portal.firebasestorage.app",
      messagingSenderId: "45891604739",
      appId: "1:45891604739:web:33251f784080f09816d936"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allTeachers = []; 

    const noImageSvg = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%23333'%3E%3Crect width='100' height='100' fill='%23111'/%3E%3Ccircle cx='50' cy='35' r='18' fill='%23333'/%3E%3Crect x='20' y='65' width='60' height='35' rx='10' fill='%23333'/%3E%3C/svg%3E";

    db.ref('teachers').on('value', (snapshot) => {
      const data = snapshot.val() || {};
      allTeachers = Object.values(data);
      renderTeachers(allTeachers);
    });

    function renderTeachers(list) {
      const grid = document.getElementById('teachers-grid');
      
      if(list.length === 0) {
        grid.innerHTML = '<div style="text-align:center; color:var(--muted); grid-column: 1 / -1; padding: 40px; font-size:1.1rem;">No teachers found in the directory.</div>';
        return;
      }
      
      grid.innerHTML = list.map(t => {
        let finalImage = t.image || noImageSvg;
        

        const acroBadge = t.acronym ? `<span style="background:var(--gold); color:var(--bg-dark); font-size:0.8rem; padding:2px 8px; border-radius:12px; font-weight:900; margin-left:8px; vertical-align:middle;">${t.acronym}</span>` : '';
        
        return `
          <div class="t-card">
            <div style="background: #111; width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto 15px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                <img src="${finalImage}" style="width:100%; height:100%; object-fit:cover;" alt="Profile Photo" onerror="this.src='${noImageSvg}'">
            </div>
            <div class="t-name" style="display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:5px;">
              ${t.name}
            </div>
            <div class="t-desig">${t.designation}</div>
            <div class="t-dept">Dept. of ${t.dept}</div>
            
            ${t.acronym ? `<div class="t-short">${t.acronym}</div>` : ''}
            
            ${(t.email || t.phone) ? `
            <div class="t-contact">
              ${t.email ? `<div><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>${t.email}</span></div>` : ''}
              ${t.phone ? `<div><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>${t.phone}</span></div>` : ''}
            </div>` : ''}
          </div>
        `;
      }).join('');
    }

    function filterTeachers() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const filtered = allTeachers.filter(t => 
        (t.name && t.name.toLowerCase().includes(query)) || 
        (t.acronym && t.acronym.toLowerCase().includes(query)) || 
        (t.dept && t.dept.toLowerCase().includes(query)) || 
        (t.designation && t.designation.toLowerCase().includes(query))
      );
      renderTeachers(filtered);
    }

    (function() {
  const PAGE_NAME = 'teachers'; 
  const db = firebase.database();
  

  db.ref('visitors/total_visits').transaction(v => (v || 0) + 1).catch(e => console.error(e));
  db.ref('visitors/pages/' + PAGE_NAME).transaction(v => (v || 0) + 1).catch(e => console.error(e));
  

  const onlineRef = db.ref('visitors/online_count');
  

  const safeRandomId = Date.now() + '_' + Math.floor(Math.random() * 1000);
  const userRef = db.ref('visitors/online_users/' + safeRandomId);
  
  userRef.set(true).catch(e => console.error(e));
  userRef.onDisconnect().remove();
  
  db.ref('visitors/online_users').on('value', snap => {
    const count = snap.numChildren();
    onlineRef.set(count).catch(e => console.error(e));
  });
})();
    
  </script>

  <script src="../navbar.js"></script>
</body>
</html>
