<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to HackBit</title>
    <style>
        /* Reset some default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4b6cb7, #182848);
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 700px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: slideIn 1s ease forwards;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            font-size: 1rem;
            color: #fff;
            background-color: #ff4b2b;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #ff416c;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideIn {
            from {transform: translateY(-50px); opacity: 0;}
            to {transform: translateY(0); opacity: 1;}
        }

        /* Floating background circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 10s infinite ease-in-out;
        }

        .circle:nth-child(1) { width: 100px; height: 100px; top: 10%; left: 20%; animation-duration: 12s;}
        .circle:nth-child(2) { width: 150px; height: 150px; top: 70%; left: 10%; animation-duration: 15s;}
        .circle:nth-child(3) { width: 80px; height: 80px; top: 40%; left: 80%; animation-duration: 10s;}
        .circle:nth-child(4) { width: 120px; height: 120px; top: 80%; left: 70%; animation-duration: 18s;}

        @keyframes float {
            0% { transform: translateY(0) translateX(0);}
            50% { transform: translateY(-20px) translateX(15px);}
            100% { transform: translateY(0) translateX(0);}
        }
    </style>
</head>
<body>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="container">
        <h1>Welcome to HackBit!</h1>
        <p>Discover the world of cybersecurity, ethical hacking, and tech insights with us. Whether you're a beginner or a pro, HackBit has something for everyone. Dive in, explore, and enhance your skills.</p>
        <a href="about.html" class="btn">Get Started</a>
    </div>
</body>
</html>
